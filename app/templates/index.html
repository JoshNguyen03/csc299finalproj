{% extends "base.html" %}
{% block title %}All Recipes{% endblock %}
{% block content %}
<h1>All Recipes</h1>
<ul>
    {% for recipe in recipes %}
    <li><a href="/recipe/{{ recipe['id'] }}">{{ recipe['name'] }}</a></li>
    {% else %}
    <li style="color: var(--text-dim);">No recipes yet. <a href="/recipe/new">Add one.</a></li>
    {% endfor %}
</ul>
{% endblock %}
