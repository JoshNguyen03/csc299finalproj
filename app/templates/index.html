{% extends "base.html" %}
{% block title %}All Recipes{% endblock %}
{% block content %}
<h1>All Recipes</h1>
<a href="/recipe/new">+ Add Recipe</a>
<ul>
    {% for recipe in recipes %}
    <li><a href="/recipe/{{ recipe['id'] }}">{{ recipe['name'] }}</a></li>
    {% else %}
    <li>No recipes yet.</li>
    {% endfor %}
</ul>
{% endblock %}
