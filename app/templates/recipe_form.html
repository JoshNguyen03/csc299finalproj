{% extends "base.html" %}
{% block title %}New Recipe{% endblock %}
{% block content %}
<h1>Add a Recipe</h1>
<form method="post" action="/recipe/new">
    <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required>
    </div>

    <div style="display: flex; gap: 16px;">
        <div class="form-group" style="flex: 1;">
            <label>Prep Time (min)</label>
            <input type="number" name="prep_time" min="0">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Cook Time (min)</label>
            <input type="number" name="cook_time" min="0">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Servings</label>
            <input type="number" name="servings" min="1">
        </div>
    </div>

    <div class="form-group">
        <label>Tags (comma-separated, e.g. vegan, gluten-free)</label>
        <input type="text" name="tags">
    </div>

    <h2>Ingredients</h2>
    <table id="ingredients-table">
        <thead>
            <tr>
                <th>Ingredient</th>
                <th>Quantity</th>
                <th>Unit</th>
                <th>Substitutes (comma-separated)</th>
            </tr>
        </thead>
        <tbody id="ingredients-body">
            <tr>
                <td><input type="text" name="ingredient_name" placeholder="e.g. flour"></td>
                <td><input type="text" name="ingredient_quantity" placeholder="e.g. 2"></td>
                <td><input type="text" name="ingredient_unit" placeholder="e.g. cups"></td>
                <td><input type="text" name="ingredient_substitutes" placeholder="e.g. almond flour"></td>
            </tr>
        </tbody>
    </table>
    <button type="button" onclick="addRow()" style="margin-bottom: 24px;">+ Add Ingredient</button>

    <div class="form-group">
        <label>Instructions</label>
        <textarea name="instructions" rows="10"></textarea>
    </div>

    <button type="submit">Save Recipe</button>
</form>

<script>
    function addRow() {
        const tbody = document.getElementById("ingredients-body");
        const row = document.createElement("tr");
        row.innerHTML = `
            <td><input type="text" name="ingredient_name" placeholder="e.g. flour"></td>
            <td><input type="text" name="ingredient_quantity" placeholder="e.g. 2"></td>
            <td><input type="text" name="ingredient_unit" placeholder="e.g. cups"></td>
            <td><input type="text" name="ingredient_substitutes" placeholder="e.g. almond flour"></td>
        `;
        tbody.appendChild(row);
    }
</script>
{% endblock %}
